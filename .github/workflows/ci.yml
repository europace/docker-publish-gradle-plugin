name: CI

on: [ pull_request ]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # creates a new check with unit test results
      checks: write
      # needs to git diff the repo
      contents: read
      # find the pr for this commit
      issues: read
      # write artifacts and comment on pr related to this
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          fetch-depth: 1
      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # 5.5.0
        with:
          distribution: 'corretto'
          java-version: 17
          cache: 'gradle'
      - name: clean build
        run: ./gradlew clean build --no-daemon --info --stacktrace
      - name: Upload Test Results
        # see ci-test.check.yml for workflow that publishes test results without security issues for forks
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        if: ${{ always() }}
        with:
          name: check-ci-results
          path: '**/build/test-results/test/TEST-*.xml'
